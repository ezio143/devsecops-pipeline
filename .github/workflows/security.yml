name: DevSecOps Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: semgrep scan --config auto --error .

  secrets:
    name: Secrets - Gitleaks (Diff Scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  complete_secrets_scan:
    name: Secrets - Gitleaks (Working-dir Scan)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks (working-dir scan)
        run: gitleaks dir . --verbose

  sca:
    name: SCA - Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL

  iac:
    name: IaC - Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Checkov
        run: pip3 install checkov
      - name: Run Checkov
        run: checkov -d terraform/
