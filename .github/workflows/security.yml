name: DevSecOps Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: semgrep scan --config auto --config custom-rules/ --sarif --output semgrep-results.sarif --error .
      - name: Upload Raw Semgrep Results as an Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          if-no-files-found: error

  secrets:
    name: Secrets - Gitleaks (Diff Scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_REPORT_FORMAT: json
          GITLEAKS_REPORT_PATH: gitleaks-diff-scan-results.json
      - name: Upload Gitleaks Diff Scan Results as an Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-diff-scan-results
          path: gitleaks-results.sarif
          if-no-files-found: error

  complete_secrets_scan:
    name: Secrets - Gitleaks (Working-dir Scan)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks (working-dir scan)
        run: gitleaks git . --verbose --report-format json --report-path gitleaks-working-dir-scan-results.json

      - name: Upload Gitleaks Working-dir Scan Results as an Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-working-dir-scan-results
          path: gitleaks-working-dir-scan-results.json
          if-no-files-found: error

  sca:
    name: SCA - Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
      - name: Upload Trivy Scan Results as an Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          if-no-files-found: error

  iac:
    name: IaC - Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Checkov
        run: pip3 install checkov
      - name: Run Checkov
        run: checkov -d terraform/ -o sarif --output-file-path .
      - name: Upload Checkov Scan Results as an Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: checkov-scan-results
          path: results_sarif.sarif
          if-no-files-found: error
